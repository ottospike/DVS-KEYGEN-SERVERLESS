<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVS Keygen - Assinaturas</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Gerenciamento de Assinaturas</h1>
            <p>Gerencie assinaturas de licença e renovações automáticas</p>
            <nav class="nav-links"><a href="/">Keygen</a></nav>
        </div>

        <div class="stats">
            <div class="stat-card"><h3>Total</h3><div class="value" id="total-subs">0</div></div>
            <div class="stat-card"><h3>Ativas</h3><div class="value" id="active-subs" style="color:#28a745">0</div></div>
            <div class="stat-card"><h3>Expiradas</h3><div class="value" id="expired-subs" style="color:#dc3545">0</div></div>
            <div class="stat-card"><h3>Expirando em Breve</h3><div class="value" id="expiring-subs" style="color:#ffc107">0</div></div>
        </div>

        <div class="section">
            <h2>Adicionar Assinatura</h2>
            <form id="subscribe-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="email">Endereço de E-mail</label>
                        <input type="email" id="email" placeholder="usuario@exemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label for="quantity">Chaves por Renovação</label>
                        <input type="number" id="quantity" min="1" max="100" value="3" required>
                    </div>
                </div>
                <button type="submit">Adicionar Assinatura</button>
            </form>
        </div>

        <div class="section">
            <h2>Todas as Assinaturas</h2>
            <div id="subs-container"><div class="loading">Carregando...</div></div>
        </div>
    </div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Editar Assinatura</h3></div>
            <form id="edit-form">
                <input type="hidden" id="edit-email">
                <div class="form-group">
                    <label for="edit-quantity">Chaves por Renovação</label>
                    <input type="number" id="edit-quantity" min="1" max="100" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="secondary" onclick="document.getElementById('edit-modal').classList.remove('active')">Cancelar</button>
                    <button type="submit">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <footer style="text-align:center;padding:20px 0 10px;color:#888;font-size:0.85rem;">
        powered by: TATAFODAO, ETERNO DEUS DO BROADCAST
    </footer>
    <div id="toast-container"></div>
    <script src="admin.js"></script>
</body>
</html>
