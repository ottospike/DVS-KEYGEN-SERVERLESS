<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVS Keygen - Subscriptions</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Subscription Management</h1>
            <p>Manage license subscriptions and automatic renewals</p>
            <nav class="nav-links"><a href="/">Keygen</a></nav>
        </div>

        <div class="stats">
            <div class="stat-card"><h3>Total</h3><div class="value" id="total-subs">0</div></div>
            <div class="stat-card"><h3>Active</h3><div class="value" id="active-subs" style="color:#28a745">0</div></div>
            <div class="stat-card"><h3>Expired</h3><div class="value" id="expired-subs" style="color:#dc3545">0</div></div>
            <div class="stat-card"><h3>Expiring Soon</h3><div class="value" id="expiring-subs" style="color:#ffc107">0</div></div>
        </div>

        <div class="section">
            <h2>Add Subscription</h2>
            <form id="subscribe-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="user@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="quantity">Keys per Renewal</label>
                        <input type="number" id="quantity" min="1" max="100" value="3" required>
                    </div>
                </div>
                <button type="submit">Add Subscription</button>
            </form>
        </div>

        <div class="section">
            <h2>All Subscriptions</h2>
            <div id="subs-container"><div class="loading">Loading...</div></div>
        </div>
    </div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Edit Subscription</h3></div>
            <form id="edit-form">
                <input type="hidden" id="edit-email">
                <div class="form-group">
                    <label for="edit-quantity">Keys per Renewal</label>
                    <input type="number" id="edit-quantity" min="1" max="100" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="secondary" onclick="document.getElementById('edit-modal').classList.remove('active')">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="admin.js"></script>
</body>
</html>
